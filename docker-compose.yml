services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hackathon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD precisa estar definido no .env}
      POSTGRES_DB: ${POSTGRES_DB:-voluntariado_db}
    # Porta NÃO exposta externamente — acesso só dentro da rede do compose.
    # Para acessar localmente em dev, suba também o docker-compose.dev.yml.
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hackathon} -d ${POSTGRES_DB:-voluntariado_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hackathon}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD precisa estar definido no .env}@db:5432/${POSTGRES_DB:-voluntariado_db}
      IA_PROVIDER: ${IA_PROVIDER:-fallback}
      WATSONX_API_KEY: ${WATSONX_API_KEY:-}
      WATSONX_PROJECT_ID: ${WATSONX_PROJECT_ID:-}
      WATSONX_MODEL_ID: ${WATSONX_MODEL_ID:-ibm/granite-3-8b-instruct}
      WATSONX_URL: ${WATSONX_URL:-https://us-south.ml.cloud.ibm.com}
    depends_on:
      db:
        condition: service_healthy

# pgAdmin foi removido daqui por motivo de segurança — estava exposto
# publicamente na :5050 com credenciais default. Para uso em desenvolvimento
# local, suba com:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# (o arquivo dev NÃO é carregado automaticamente nem em CI/CD nem em produção.)

volumes:
  pgdata:
