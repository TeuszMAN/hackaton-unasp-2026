<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MatchHelp — Chamados</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              mh: {
                blue: '#2b529a',
                orange: '#f69331',
                teal: '#37a991',
                lightblue: '#1b91f6',
                purple: '#7a52cc',
              }
            }
          }
        }
      }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body class="bg-white text-slate-900 overflow-x-hidden">

    <!-- Background -->
    <div
      class="fixed inset-0 -z-10 overflow-hidden pointer-events-none opacity-10">
      <div
        class="absolute top-20 left-10 w-72 h-72 bg-mh-orange rounded-full blur-3xl"></div>
      <div
        class="absolute bottom-10 right-10 w-96 h-96 bg-mh-blue rounded-full blur-3xl"></div>
    </div>

    <!-- Navbar -->
    <header
      class="fixed top-0 left-0 w-full z-50 backdrop-blur-xl bg-white/80 border-b border-slate-100">
      <div
        class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">

        <div class="flex items-center gap-3">
          <img
            src="asset/img/Logo.png"
            alt="MatchHelp Logo"
            onerror="this.src='https://placehold.co/40x40?text=MH'"
            width="42"
            height="42" />

          <div>
            <div
              class="text-2xl font-extrabold italic tracking-tight text-mh-blue">
              Match<span class="text-mh-orange">Help</span>
            </div>

            <div
              class="text-xs text-slate-400 font-medium uppercase tracking-wider">
              Chamados
            </div>
          </div>
        </div>

        <nav
          class="hidden md:flex items-center gap-3 text-sm font-semibold text-slate-600">

          <a href="home.html"
            class="hover:bg-slate-100 px-4 py-2 rounded-xl transition">
            Início
          </a>

          <a href="voluntarios.html"
            class="hover:bg-slate-100 px-4 py-2 rounded-xl transition">
            Voluntários
          </a>

          <a href="instituicoes.html"
            class="hover:bg-slate-100 px-4 py-2 rounded-xl transition">
            Instituições
          </a>

          <a href="chamados.html"
            class="text-mh-blue bg-mh-orange/10 border border-mh-orange px-4 py-2 rounded-xl">
            Chamados
          </a>

          <a href="match.html"
            class="hover:bg-slate-100 px-4 py-2 rounded-xl transition">
            Match
          </a>

        </nav>
      </div>
    </header>

    <!-- Main -->
    <main class="pt-36 pb-24 px-6">
      <div class="max-w-7xl mx-auto">

        <!-- Header -->
        <div
          class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 mb-10">

          <div>
            <a href="home.html"
              class="inline-flex items-center gap-2 text-sm text-slate-400 hover:text-mh-blue transition mb-4">
              <i data-lucide="arrow-left" class="w-4 h-4"></i>
              Voltar ao painel
            </a>

            <h1
              class="text-5xl font-extrabold tracking-tight mb-3 text-slate-800">
              Chamados de crise
            </h1>

            <p class="text-slate-500 text-lg max-w-2xl leading-relaxed">
              Necessidades registradas pelas instituições, organizadas por nível
              de urgência e prontas para receber apoio voluntário.
            </p>
          </div>

          <button
            onclick="carregar()"
            class="bg-mh-blue text-white px-6 py-3 rounded-2xl font-semibold hover:bg-mh-orange transition flex items-center gap-2 shadow-lg shadow-mh-blue/10">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            Atualizar
          </button>
        </div>

        <!-- Toolbar -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">

          <input
            id="busca"
            type="text"
            placeholder="Buscar na descrição..."
            class="w-full bg-white border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-4 focus:ring-mh-orange/10 focus:border-mh-orange transition" />

          <select
            id="filtroStatus"
            class="w-full bg-white border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-4 focus:ring-mh-orange/10 focus:border-mh-orange transition">
            <option value>Todos os status</option>
            <option value="aberta">Aberta</option>
            <option value="em_atendimento">Em atendimento</option>
            <option value="concluida">Concluída</option>
            <option value="cancelada">Cancelada</option>
          </select>

          <select
            id="filtroUrgencia"
            class="w-full bg-white border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-4 focus:ring-mh-orange/10 focus:border-mh-orange transition">
            <option value>Qualquer urgência</option>
            <option value="critica">Crítica</option>
            <option value="alta">Alta</option>
            <option value="media">Média</option>
            <option value="baixa">Baixa</option>
          </select>
        </div>

        <!-- Error -->
        <div
          id="erro"
          style="display:none"
          class="mb-8 bg-red-50 border border-red-200 text-red-600 px-5 py-4 rounded-2xl text-sm">
        </div>

        <!-- Lista -->
        <div id="lista" class="grid grid-cols-1 gap-6">
          <div
            class="bg-white border border-slate-100 rounded-3xl p-8 shadow-sm text-slate-400">
            Carregando chamados...
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-100 bg-slate-50 py-10 text-center">
      <div class="max-w-7xl mx-auto px-6">
        <p class="text-slate-400 text-sm mb-2">
          MatchHelp · API:
          <code id="api-url">—</code>
        </p>
      </div>
    </footer>

    <script src="asset/js/api-config.js"></script>

    <script>
      document.getElementById("api-url").innerText = window.MATCHHELP_API;

      let cache = [];

      function badgeUrg(u) {
        const map = {
          critica: "bg-red-100 text-red-600",
          alta: "bg-orange-100 text-orange-600",
          media: "bg-amber-100 text-amber-700",
          baixa: "bg-slate-100 text-slate-600",
        };

        return `
          <span class="px-3 py-1 rounded-xl text-xs font-bold ${map[u] || map.baixa}">
            ${(u || "—").toUpperCase()}
          </span>
        `;
      }

      function badgeStatus(s) {
        const map = {
          aberta: "bg-mh-lightblue/10 text-mh-lightblue",
          em_atendimento: "bg-mh-orange/10 text-mh-orange",
          concluida: "bg-green-100 text-green-600",
          cancelada: "bg-slate-100 text-slate-500",
        };

        return `
          <span class="px-3 py-1 rounded-xl text-xs font-bold ${map[s] || map.cancelada}">
            ${(s || "—").replace("_", " ")}
          </span>
        `;
      }

      function render() {
        const q = document.getElementById("busca").value.trim().toLowerCase();
        const st = document.getElementById("filtroStatus").value;
        const ur = document.getElementById("filtroUrgencia").value;

        const filtrados = cache.filter(n => {
          if (
            q &&
            !(n.descricao_crise || "").toLowerCase().includes(q)
          ) return false;

          if (st && n.status !== st) return false;

          if (ur && n.nivel_urgencia !== ur) return false;

          return true;
        });

        const lista = document.getElementById("lista");

        if (!filtrados.length) {
          lista.innerHTML = `
            <div class="bg-white border border-slate-100 rounded-3xl p-10 text-center text-slate-400 shadow-sm">
              Nenhum chamado encontrado.
            </div>
          `;
          return;
        }

        lista.innerHTML = filtrados.map(n => `
          <div class="bg-white border border-slate-100 rounded-3xl p-8 shadow-sm hover:shadow-xl transition-all duration-300 hover:-translate-y-1">

            <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-6">

              <div class="flex-1">

                <div class="flex flex-wrap gap-2 mb-5">
                  ${badgeUrg(n.nivel_urgencia)}
                  ${badgeStatus(n.status)}
                </div>

                <h3 class="text-2xl font-bold text-slate-800 leading-tight mb-4">
                  ${(n.descricao_crise || "").slice(0, 220)}
                  ${(n.descricao_crise || "").length > 220 ? "..." : ""}
                </h3>

                <div class="flex flex-wrap gap-4 text-sm text-slate-500 mb-5">

                  ${
                    n.endereco_texto
                      ? `
                    <span class="flex items-center gap-1">
                      <i data-lucide="map-pin" class="w-4 h-4"></i>
                      ${n.endereco_texto}
                    </span>
                  `
                      : ""
                  }

                  ${
                    n.criado_em
                      ? `
                    <span class="flex items-center gap-1">
                      <i data-lucide="clock" class="w-4 h-4"></i>
                      ${new Date(n.criado_em).toLocaleString("pt-BR")}
                    </span>
                  `
                      : ""
                  }

                </div>

                ${
                  (n.habilidades_requeridas || []).length
                    ? `
                  <div class="flex flex-wrap gap-2">
                    ${n.habilidades_requeridas.map(h => `
                      <span class="bg-mh-blue/10 text-mh-blue px-3 py-1 rounded-xl text-xs font-semibold">
                        ${h}
                      </span>
                    `).join("")}
                  </div>
                `
                    : ""
                }

              </div>

            </div>
          </div>
        `).join("");

        lucide.createIcons();
      }

      async function carregar() {
        const erro = document.getElementById("erro");

        erro.style.display = "none";

        try {
          const data = await window.matchhelpFetch("/api/v1/necessidades");

          cache = Array.isArray(data)
            ? data
            : (data.items || []);

          const ordemU = {
            critica: 0,
            alta: 1,
            media: 2,
            baixa: 3
          };

          cache.sort(
            (a, b) =>
              (ordemU[a.nivel_urgencia] ?? 9) -
              (ordemU[b.nivel_urgencia] ?? 9)
          );

          render();

        } catch (e) {
          erro.style.display = "block";

          erro.innerText =
            "Falha ao carregar chamados: " + e.message;

          document.getElementById("lista").innerHTML = `
            <div class="bg-white border border-slate-100 rounded-3xl p-10 text-center text-slate-400 shadow-sm">
              Sem dados para exibir.
            </div>
          `;
        }
      }

      ["busca", "filtroStatus", "filtroUrgencia"].forEach(id => {
        document
          .getElementById(id)
          .addEventListener("input", render);

        document
          .getElementById(id)
          .addEventListener("change", render);
      });

      lucide.createIcons();
      carregar();
    </script>
  </body>
</html>
