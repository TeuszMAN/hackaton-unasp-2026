<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MatchHelp — Login do Voluntário</title>

        <!-- Tailwind -->
        <script src="https://cdn.tailwindcss.com"></script>

        <script>
            tailwind.config = {
                theme: {
                extend: {
                    colors: {
                    mh: {
                        blue: '#2b529a',
                        orange: '#f69331',
                        teal: '#37a991',
                        lightblue: '#1b91f6',
                        purple: '#7a52cc',
                    }
                    }
                }
                }
            }
        </script>

        <!-- Lucide -->
        <script src="https://unpkg.com/lucide@latest"></script>
    </head>

    <body class="bg-white text-slate-900 min-h-screen overflow-x-hidden">

        <!-- Background -->
        <div
            class="fixed inset-0 -z-10 overflow-hidden opacity-10 pointer-events-none">
            <div
                class="absolute top-20 left-10 w-72 h-72 bg-mh-orange rounded-full blur-3xl"></div>
            <div
                class="absolute bottom-10 right-10 w-96 h-96 bg-mh-blue rounded-full blur-3xl"></div>
        </div>

        <!-- Navbar -->
        <header
            class="fixed top-0 left-0 w-full z-50 backdrop-blur-xl bg-white/80 border-b border-slate-100">
            <div
                class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">

                <div class="flex items-center gap-3">
                    <img
                        src="asset/img/Logo.png"
                        alt="MatchHelp Logo"
                        onerror="this.src='https://placehold.co/40x40?text=MH'"
                        width="42"
                        height="42" />

                    <div>
                        <div
                            class="text-2xl font-extrabold italic tracking-tight text-mh-blue">
                            Match<span class="text-mh-orange">Help</span>
                        </div>

                        <div
                            class="text-xs text-slate-400 font-medium uppercase tracking-wider">
                            Login do voluntário
                        </div>
                    </div>
                </div>

                <a
                    href="usuario.html"
                    class="hover:bg-slate-100 px-4 py-2 rounded-xl transition text-sm font-semibold text-slate-600">
                    Voltar
                </a>
            </div>
        </header>

        <!-- Login -->
        <main
            class="min-h-screen flex items-center justify-center px-6 pt-32 pb-10">

            <div class="w-full max-w-md">

                <div
                    class="bg-white border border-slate-100 rounded-[2rem] shadow-2xl p-10">

                    <!-- Icon -->
                    <div class="text-center mb-8">

                        <div
                            class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-mh-orange/10 text-mh-orange mb-6">
                            <i data-lucide="shield-check" class="w-10 h-10"></i>
                        </div>

                        <h1
                            class="text-4xl font-extrabold tracking-tight text-slate-800 mb-3">
                            Bem-vindo
                        </h1>

                        <p class="text-slate-500 leading-relaxed">
                            Utilize o Login ID e a senha fornecidos pela
                            assistente Judith para acessar sua conta.
                        </p>
                    </div>

                    <!-- Form -->
                    <form id="loginForm" class="space-y-5">

                        <!-- Error -->
                        <div
                            id="errorBox"
                            class="hidden bg-red-50 border border-red-100 text-red-600 px-5 py-4 rounded-2xl text-sm font-medium"></div>

                        <!-- Login -->
                        <div>
                            <label
                                class="block text-sm font-bold text-slate-700 mb-2">
                                Login ID
                            </label>

                            <input
                                type="text"
                                id="loginId"
                                required
                                maxlength="8"
                                placeholder="ABC12345"
                                class="w-full bg-white border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-4 focus:ring-mh-orange/10 focus:border-mh-orange transition uppercase font-mono tracking-wider" />
                        </div>

                        <!-- Senha -->
                        <div>
                            <label
                                class="block text-sm font-bold text-slate-700 mb-2">
                                Senha
                            </label>

                            <input
                                type="password"
                                id="senha"
                                required
                                placeholder="••••••••"
                                class="w-full bg-white border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-4 focus:ring-mh-orange/10 focus:border-mh-orange transition" />
                        </div>

                        <!-- Button -->
                        <button
                            type="submit"
                            id="btnSubmit"
                            class="w-full bg-mh-blue text-white font-bold py-4 rounded-2xl hover:bg-mh-orange transition-all shadow-xl shadow-mh-blue/10 flex items-center justify-center gap-2 mt-6">
                            Entrar
                            <i data-lucide="arrow-right" class="w-5 h-5"></i>
                        </button>
                    </form>
                </div>
            </div>
        </main>

        <script src="asset/js/api-config.js"></script>
        <script src="asset/js/script-login.js"></script>
    </body>
</html>
