<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Match Help | Login</title>

        <!-- Framework Tailwind CSS -->
        <script src="https://cdn.tailwindcss.com"></script>

        <!-- Ícones Lucide -->
        <script src="https://unpkg.com/lucide@latest"></script>

        <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        /* PALETA DE CORES EXTRAÍDA DA IMAGEM */
        :root {
            --brand-navy: #0a2540;    
            --brand-blue: #0088ff;    
            --brand-emerald: #00b894; 
        }

        body {
            background-color: #ffffff;
            color: #1e293b;
            font-family: 'Inter', sans-serif;
        }

        .login-input {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .login-input:focus {
            border-color: var(--brand-blue);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 136, 255, 0.1);
            outline: none;
        }

        .btn-primary {
            background-color: var(--brand-navy);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: var(--brand-blue);
            transform: translateY(-1px);
        }
    </style>
    </head>
    <body class="min-h-screen flex items-center justify-center p-6">

        <div class="w-full max-w-md space-y-8">

            <!-- Branding -->
            <div class="text-center space-y-4">
                <div
                    class="inline-flex bg-[#0a2540] p-5 rounded-3xl shadow-xl text-white">
                    <i data-lucide="handshake" class="w-12 h-12"
                        style="color: var(--brand-blue)"></i>
                </div>
                <div>
                    <h1
                        class="text-5xl font-black tracking-tighter uppercase text-slate-900">MATCH<span
                            style="color: var(--brand-blue)">HELP</span></h1>
                </div>
            </div>

            <!-- Card de Login -->
            <div
                class="bg-white p-8 space-y-6 rounded-2xl border border-slate-200 shadow-2xl">
                <div class="space-y-1 text-center">
                    <h2
                        class="text-xl font-bold text-slate-800 uppercase tracking-widest">Login</h2>
                </div>

                <form id="login-form" class="space-y-4">
                    <div class="space-y-1.5">
                        <label
                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Usuário</label>
                        <input type="email" required
                            class="login-input w-full px-4 py-3 rounded-xl text-sm font-medium"
                            placeholder="admin@matchhelp.org">
                    </div>

                    <div class="space-y-1.5">
                        <label
                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Senha</label>
                        <input type="password" required
                            class="login-input w-full px-4 py-3 rounded-xl text-sm tracking-widest"
                            placeholder="••••••••">
                    </div>

                    <button type="submit"
                        class="btn-primary w-full font-black py-4 rounded-xl shadow-lg flex items-center justify-center gap-3 group uppercase tracking-widest text-xs">
                        Entrar
                        <i data-lucide="shield-check" class="w-4 h-4"></i>
                    </button>
                </form>
            </div>

            <!-- Rodapé simples -->
            <p
                class="text-center text-[9px] text-slate-400 uppercase font-bold tracking-[0.2em]">
                Match Help • Segurança Garantida
            </p>
        </div>

        <script>
        // Inicializar ícones da biblioteca Lucide
        lucide.createIcons();

        // Lógica básica de submissão do formulário
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            // Ação de autenticação pode ser implementada aqui
            console.log("Submissão de login processada.");
        };
    </script>
    </body>
</html>
