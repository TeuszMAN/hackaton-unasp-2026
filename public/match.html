<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MatchHelp — Match Inteligente</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              mh: {
                blue: '#2b529a',
                orange: '#f69331',
                teal: '#37a991',
                lightblue: '#1b91f6',
                purple: '#7a52cc',
              }
            }
          }
        }
      }
    </script>

    <!-- Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="asset/css/style-home.css" />
  </head>

  <body class="bg-white text-slate-900 overflow-x-hidden">

    <!-- Background -->
    <div
      class="fixed inset-0 -z-10 overflow-hidden pointer-events-none opacity-10">
      <div
        class="absolute top-20 left-10 w-72 h-72 bg-mh-orange rounded-full blur-3xl"></div>
      <div
        class="absolute bottom-10 right-10 w-96 h-96 bg-mh-blue rounded-full blur-3xl"></div>
    </div>

    <!-- Navbar -->
    <header
      class="fixed top-0 left-0 w-full z-50 backdrop-blur-xl bg-white/80 border-b border-slate-100">
      <div
        class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">

        <div class="flex items-center gap-3">
          <img
            src="asset/img/Logo.png"
            alt="MatchHelp Logo"
            onerror="this.src='https://placehold.co/40x40?text=MH'"
            width="42"
            height="42" />

          <div>
            <div
              class="text-2xl font-extrabold italic tracking-tight text-mh-blue">
              Match<span class="text-mh-orange">Help</span>
            </div>

            <div
              class="text-xs text-slate-400 font-medium uppercase tracking-wider">
              Match Inteligente
            </div>
          </div>
        </div>

        <nav
          class="hidden md:flex items-center gap-3 text-sm font-semibold text-slate-600">

          <a href="home.html"
            class="hover:bg-slate-100 px-4 py-2 rounded-xl transition">
            Início
          </a>

          <a href="voluntarios.html"
            class="hover:bg-slate-100 px-4 py-2 rounded-xl transition">
            Voluntários
          </a>

          <a href="instituicoes.html"
            class="hover:bg-slate-100 px-4 py-2 rounded-xl transition">
            Instituições
          </a>

          <a href="chamados.html"
            class="hover:bg-slate-100 px-4 py-2 rounded-xl transition">
            Chamados
          </a>

          <a href="match.html"
            class="text-mh-blue bg-mh-orange/10 border border-mh-orange px-4 py-2 rounded-xl">
            Match
          </a>

        </nav>
      </div>
    </header>

    <!-- Main -->
    <main class="pt-36 pb-24 px-6">
      <div class="max-w-7xl mx-auto">

        <!-- Header -->
        <div
          class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 mb-10">

          <div>
            <a href="home.html"
              class="inline-flex items-center gap-2 text-sm text-slate-400 hover:text-mh-blue transition mb-4">
              <i data-lucide="arrow-left" class="w-4 h-4"></i>
              Voltar ao painel
            </a>

            <h1
              class="text-5xl font-extrabold tracking-tight mb-3 text-slate-800">
              Match Inteligente
            </h1>

            <p class="text-slate-500 text-lg max-w-2xl leading-relaxed">
              Execute o algoritmo de correspondência entre voluntários e crises
              utilizando skills, proximidade e reputação.
            </p>
          </div>
        </div>

        <!-- Tabs -->
        <div class="flex flex-wrap gap-3 mb-10">

          <button
            class="tab-btn active-tab bg-mh-blue text-white px-5 py-3 rounded-2xl font-semibold flex items-center gap-2 shadow-lg shadow-mh-blue/10 transition"
            data-tab="rodar"
            onclick="trocarTab('rodar')">

            <i data-lucide="zap" class="w-4 h-4"></i>
            Rodar Match
          </button>

          <button
            class="tab-btn bg-white border border-slate-200 text-slate-600 px-5 py-3 rounded-2xl font-semibold flex items-center gap-2 hover:border-mh-orange hover:text-mh-blue transition"
            data-tab="aprovacao"
            onclick="trocarTab('aprovacao')">

            <i data-lucide="inbox" class="w-4 h-4"></i>
            Caixa de Aprovação

            <span
              id="badge-pendentes"
              class="hidden bg-red-500 text-white text-xs px-2 py-1 rounded-full font-bold">
              0
            </span>
          </button>

        </div>

        <!-- TAB RODAR -->
        <section id="tab-rodar" class="tab-panel">

          <div
            class="bg-white border border-slate-100 rounded-3xl p-6 shadow-sm mb-8">

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

              <div>
                <label
                  class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">
                  Chamado
                </label>

                <select
                  id="selectChamado"
                  class="w-full bg-white border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-4 focus:ring-mh-orange/10 focus:border-mh-orange transition">
                  <option value>Carregando chamados...</option>
                </select>
              </div>

              <div>
                <label
                  class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">
                  Top N
                </label>

                <select
                  id="selectTopN"
                  class="w-full bg-white border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-4 focus:ring-mh-orange/10 focus:border-mh-orange transition">

                  <option value="3">3</option>
                  <option value="5" selected>5</option>
                  <option value="10">10</option>
                  <option value="15">15</option>
                </select>
              </div>

              <div class="flex items-end">
                <button
                  id="btnRodar"
                  onclick="rodarMatch()"
                  class="w-full bg-mh-blue text-white px-6 py-4 rounded-2xl font-semibold hover:bg-mh-orange transition flex items-center justify-center gap-2 shadow-lg shadow-mh-blue/10">

                  <i data-lucide="play" class="w-4 h-4"></i>
                  Rodar Match
                </button>
              </div>

            </div>
          </div>

          <div
            id="matchErro"
            style="display:none"
            class="mb-8 bg-red-50 border border-red-200 text-red-600 px-5 py-4 rounded-2xl text-sm">
          </div>

          <div id="matchResultado" class="grid grid-cols-1 gap-6"></div>

        </section>

        <!-- TAB APROVACAO -->
        <section id="tab-aprovacao" class="tab-panel hidden">

          <div class="flex justify-end mb-6">
            <button
              onclick="carregarPendentes()"
              class="bg-white border border-slate-200 text-slate-600 px-5 py-3 rounded-2xl font-semibold hover:border-mh-orange hover:text-mh-blue transition flex items-center gap-2">

              <i data-lucide="refresh-cw" class="w-4 h-4"></i>
              Atualizar
            </button>
          </div>

          <div
            id="aprovacaoErro"
            style="display:none"
            class="mb-8 bg-red-50 border border-red-200 text-red-600 px-5 py-4 rounded-2xl text-sm">
          </div>

          <div
            id="aprovacaoToast"
            style="display:none"
            class="mb-8 bg-emerald-50 border border-emerald-200 text-emerald-700 px-5 py-4 rounded-2xl text-sm">
          </div>

          <div id="aprovacaoLista" class="grid grid-cols-1 gap-6">
            <div
              class="bg-white border border-slate-100 rounded-3xl p-8 shadow-sm text-slate-400">
              Carregando pendências...
            </div>
          </div>

        </section>

      </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-100 bg-slate-50 py-10 text-center">
      <div class="max-w-7xl mx-auto px-6">
        <p class="text-slate-400 text-sm mb-2">
          MatchHelp · Hackathon UNASP 2026
        </p>

        <p class="text-xs text-slate-300">
          API:
          <code id="api-url">—</code>
        </p>
      </div>
    </footer>

    <script src="asset/js/api-config.js"></script>

    <script>
      document.getElementById("api-url").innerText = window.MATCHHELP_API;

      // Tabs
      function trocarTab(nome) {
        document.querySelectorAll(".tab-panel").forEach(el => {
          el.classList.add("hidden");
        });

        document.getElementById("tab-" + nome).classList.remove("hidden");

        document.querySelectorAll(".tab-btn").forEach(btn => {
          btn.classList.remove(
            "bg-mh-blue",
            "text-white",
            "shadow-lg",
            "shadow-mh-blue/10",
            "active-tab"
          );

          btn.classList.add(
            "bg-white",
            "border",
            "border-slate-200",
            "text-slate-600"
          );
        });

        const ativo = document.querySelector(`[data-tab="${nome}"]`);

        ativo.classList.remove(
          "bg-white",
          "border",
          "border-slate-200",
          "text-slate-600"
        );

        ativo.classList.add(
          "bg-mh-blue",
          "text-white",
          "shadow-lg",
          "shadow-mh-blue/10"
        );

        if (nome === "aprovacao") carregarPendentes();
      }

      function iniciais(nome) {
        return (nome || "?")
          .split(" ")
          .map(n => n[0])
          .join("")
          .slice(0, 2)
          .toUpperCase();
      }

      function scoreColor(score) {
        if (score >= 0.7) return "bg-emerald-500";
        if (score >= 0.4) return "bg-amber-500";
        return "bg-red-500";
      }

      async function carregarChamados() {
        try {
          const data = await window.matchhelpFetch("/api/v1/necessidades");

          const lista = Array.isArray(data)
            ? data
            : (data.items || []);

          const sel = document.getElementById("selectChamado");

          if (!lista.length) {
            sel.innerHTML =
              `<option value="">Nenhum chamado encontrado</option>`;
            return;
          }

          sel.innerHTML = lista.map(n => {
            const desc = (n.descricao_crise || "").slice(0, 80);

            return `
              <option value="${n.id}">
                ${desc}${(n.descricao_crise || "").length > 80 ? "..." : ""}
              </option>
            `;
          }).join("");

        } catch (e) {
          document.getElementById("selectChamado").innerHTML =
            `<option value="">Erro ao carregar</option>`;
        }
      }

      async function rodarMatch() {
        const necessidadeId =
          document.getElementById("selectChamado").value;

        const topN =
          parseInt(document.getElementById("selectTopN").value);

        const erroDiv = document.getElementById("matchErro");
        const resultDiv = document.getElementById("matchResultado");
        const btn = document.getElementById("btnRodar");

        erroDiv.style.display = "none";

        btn.disabled = true;

        btn.innerHTML = `
          <div class="w-4 h-4 border-2 border-white border-r-transparent rounded-full animate-spin"></div>
          Processando...
        `;

        try {
          const resp = await window.matchhelpFetch(
            "/api/v1/vinculos",
            {
              method: "POST",
              body: {
                necessidade_id: necessidadeId,
                top_n: topN
              }
            }
          );

          if (!resp.recomendacoes?.length) {
            resultDiv.innerHTML = `
              <div class="bg-white border border-slate-100 rounded-3xl p-12 text-center shadow-sm">
                <div class="text-5xl mb-4">🔍</div>
                <h3 class="font-bold text-lg mb-2">
                  Nenhum voluntário encontrado
                </h3>
              </div>
            `;
            return;
          }

          resultDiv.innerHTML = resp.recomendacoes.map(r => {
            const v = r.voluntario || {};
            const scorePct = Math.round((r.score_match || 0) * 100);

            return `
              <div class="bg-white border border-slate-100 rounded-3xl p-8 shadow-sm hover:shadow-xl transition-all duration-300 hover:-translate-y-1">

                <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6 mb-6">

                  <div class="flex items-center gap-4">

                    <div
                      class="w-14 h-14 rounded-2xl bg-mh-blue text-white flex items-center justify-center font-black shadow-lg shadow-mh-blue/20">
                      ${iniciais(v.nome)}
                    </div>

                    <div>
                      <h3 class="text-xl font-bold text-slate-800">
                        ${v.nome || "—"}
                      </h3>

                      <p class="text-sm text-slate-500 mt-1">
                        Reputação:
                        ${(v.reputacao ?? 0).toFixed(1)}/5
                      </p>
                    </div>
                  </div>

                  <div class="text-right">
                    <div class="text-3xl font-black text-slate-800">
                      ${scorePct}%
                    </div>

                    <div class="w-40 h-2 bg-slate-100 rounded-full overflow-hidden mt-2">
                      <div
                        class="h-full ${scoreColor(r.score_match || 0)}"
                        style="width:${scorePct}%"></div>
                    </div>
                  </div>
                </div>

                ${
                  (r.habilidades_correspondentes || []).length
                    ? `
                  <div class="flex flex-wrap gap-2 mb-4">
                    ${r.habilidades_correspondentes.map(h => `
                      <span class="bg-mh-orange/10 text-mh-orange px-3 py-1 rounded-xl text-xs font-bold">
                        ${h}
                      </span>
                    `).join("")}
                  </div>
                `
                    : ""
                }

                ${
                  r.justificativa
                    ? `
                  <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4 text-sm text-slate-600 leading-relaxed">
                    ${r.justificativa}
                  </div>
                `
                    : ""
                }

              </div>
            `;
          }).join("");

          contarPendentes();

        } catch (e) {
          erroDiv.style.display = "block";
          erroDiv.innerText =
            "Erro ao rodar matchmaking: " + e.message;

        } finally {
          btn.disabled = false;

          btn.innerHTML = `
            <i data-lucide="play" class="w-4 h-4"></i>
            Rodar Match
          `;

          lucide.createIcons();
        }
      }

      async function contarPendentes() {
        try {
          const grupos =
            await window.matchhelpFetch("/api/v1/vinculos/pendentes");

          const total = grupos.reduce(
            (acc, g) => acc + (g.candidatos || []).length,
            0
          );

          const badge =
            document.getElementById("badge-pendentes");

          if (total > 0) {
            badge.classList.remove("hidden");
            badge.innerText = total;
          } else {
            badge.classList.add("hidden");
          }

        } catch (_) {}
      }

      async function carregarPendentes() {
        const lista =
          document.getElementById("aprovacaoLista");

        try {
          const grupos =
            await window.matchhelpFetch("/api/v1/vinculos/pendentes");

          if (!grupos.length) {
            lista.innerHTML = `
              <div class="bg-white border border-slate-100 rounded-3xl p-12 text-center shadow-sm">
                <div class="text-5xl mb-4">✅</div>
                <h3 class="font-bold text-lg mb-2">
                  Nenhum pré-match pendente
                </h3>
              </div>
            `;
            return;
          }

          lista.innerHTML = grupos.map(g => `
            <div class="bg-white border border-slate-100 rounded-3xl p-8 shadow-sm">

              <div class="mb-6">
                <h3 class="text-xl font-bold text-slate-800 mb-2">
                  ${(g.necessidade?.descricao_crise || "").slice(0, 120)}
                </h3>

                <p class="text-sm text-slate-500">
                  ${g.necessidade?.endereco_texto || ""}
                </p>
              </div>

              <div class="space-y-4">
                ${(g.candidatos || []).map(c => `
                  <div class="border border-slate-100 rounded-2xl p-5">

                    <div class="flex items-center justify-between gap-4">

                      <div>
                        <div class="font-bold text-slate-800">
                          ${c.voluntario?.nome || "—"}
                        </div>

                        <div class="text-sm text-slate-500 mt-1">
                          ${(c.score_match * 100).toFixed(0)}% de compatibilidade
                        </div>
                      </div>

                      <div class="flex gap-3">

                        <button
                          onclick="rejeitar('${c.vinculo_id}', this)"
                          class="px-4 py-2 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-100 transition text-sm font-semibold">
                          Rejeitar
                        </button>

                        <button
                          onclick="aprovar('${c.vinculo_id}', this)"
                          class="px-4 py-2 rounded-xl bg-mh-blue text-white hover:bg-mh-orange transition text-sm font-semibold">
                          Aprovar
                        </button>

                      </div>
                    </div>

                  </div>
                `).join("")}
              </div>

            </div>
          `).join("");

          lucide.createIcons();

        } catch (e) {
          document.getElementById("aprovacaoErro").style.display = "block";

          document.getElementById("aprovacaoErro").innerText =
            "Erro ao carregar pendências: " + e.message;
        }
      }

      async function aprovar(id) {
        try {
          await window.matchhelpFetch(
            `/api/v1/vinculos/${id}/aprovar`,
            { method: "POST" }
          );

          carregarPendentes();

        } catch (e) {
          alert("Erro ao aprovar");
        }
      }

      async function rejeitar(id) {
        try {
          await window.matchhelpFetch(
            `/api/v1/vinculos/${id}/rejeitar`,
            { method: "POST" }
          );

          carregarPendentes();

        } catch (e) {
          alert("Erro ao rejeitar");
        }
      }

      lucide.createIcons();

      carregarChamados();

      contarPendentes();
    </script>
  </body>
</html>
