<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MatchHelp — Trocar Senha</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/lucide@latest"></script>
    </head>
    <body
        class="bg-slate-50 text-slate-900 flex items-center justify-center min-h-screen p-4">
        <div
            class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
            <div class="text-center mb-8">
                <div
                    class="inline-flex bg-amber-100 p-3 rounded-2xl text-amber-600 mb-4">
                    <i data-lucide="shield-alert" class="w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-bold">Troca de Senha Obrigatória</h1>
                <p class="text-slate-500 text-sm mt-2">
                    Para a sua segurança, você precisa criar uma senha
                    definitiva antes de acessar o painel.
                </p>
            </div>

            <form id="senhaForm" class="space-y-5">
                <div id="errorBox"
                    class="hidden bg-red-50 text-red-600 p-4 rounded-xl text-sm font-medium border border-red-100"></div>

                <div>
                    <label
                        class="block text-sm font-bold text-slate-700 mb-2">Senha
                        Temporária (Atual)</label>
                    <input type="password" id="senhaAtual" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition-all"
                        placeholder="••••••••" />
                </div>

                <div>
                    <label
                        class="block text-sm font-bold text-slate-700 mb-2">Nova
                        Senha Definitiva</label>
                    <input type="password" id="novaSenha" required minlength="6"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition-all"
                        placeholder="Mínimo de 6 caracteres" />
                </div>

                <div>
                    <label
                        class="block text-sm font-bold text-slate-700 mb-2">Confirmar
                        Nova Senha</label>
                    <input type="password" id="confirmaSenha" required
                        minlength="6"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition-all"
                        placeholder="Repita a nova senha" />
                </div>

                <button type="submit" id="btnSubmit"
                    class="w-full bg-slate-900 text-white font-bold py-3.5 rounded-xl hover:bg-slate-800 transition-colors shadow-lg flex items-center justify-center gap-2 mt-4">
                    Salvar e Entrar <i data-lucide="check" class="w-5 h-5"></i>
                </button>
            </form>
        </div>

        <script src="asset/js/api-config.js"></script>
        <script>
    lucide.createIcons();

    // Redireciona para login se não tiver token
    if (!localStorage.getItem('mh_token')) {
      window.location.href = 'login.html';
    }

    document.getElementById('senhaForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const senhaAtual = document.getElementById('senhaAtual').value;
      const novaSenha = document.getElementById('novaSenha').value;
      const confirmaSenha = document.getElementById('confirmaSenha').value;
      const btn = document.getElementById('btnSubmit');
      const errorBox = document.getElementById('errorBox');
      
      errorBox.classList.add('hidden');

      if (novaSenha !== confirmaSenha) {
        errorBox.textContent = "As novas senhas não coincidem.";
        errorBox.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Salvando...';
      lucide.createIcons();

      try {
        const response = await fetch(`${window.MATCHHELP_API}/api/v1/auth/trocar-senha`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('mh_token')}`
          },
          body: JSON.stringify({ senha_atual: senhaAtual, nova_senha: novaSenha })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || 'Falha ao trocar a senha');
        }

        // Sucesso!
        window.location.href = 'painel-voluntario.html';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = 'Salvar e Entrar <i data-lucide="check" class="w-5 h-5"></i>';
        lucide.createIcons();
      }
    });
  </script>
    </body>
</html>
